name: Deploy to Hostinger

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload via FTP
        run: |
          curl -T v1.php -T .htaccess \
            ftp://${{ secrets.HOSTINGER_USER }}:${{ secrets.HOSTINGER_PASSWORD }}@${{ secrets.HOSTINGER_HOST }}:21/public_html/ \
            --ftp-pasv